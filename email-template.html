<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@400&display=swap" rel="stylesheet" />
  <title>New Reservation</title>
</head>
<body style="margin:0;padding:0;background-color:#f7f4ef;font-family:'Cormorant Garamond',Georgia,serif;color:#2e2a26;-webkit-font-smoothing:antialiased;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f7f4ef;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;">

          <!-- Nav wordmark: BARTH [icon] BISTRO -->
          <tr>
            <td align="center" style="padding-bottom:20px;">
              <table cellpadding="0" cellspacing="0" border="0" style="margin:0 auto;">
                <tr>
                  <td style="font-family:'Inter',Arial,sans-serif;font-size:10px;letter-spacing:0.36em;text-transform:uppercase;color:#8c8680;vertical-align:middle;padding-right:10px;">Barth</td>
                  <td style="vertical-align:middle;">
                    <img src="https://raw.githubusercontent.com/Seaham0606/barth-bistro/main/logo-barthBistro-icon.png" width="14" height="14" alt="" style="display:block;border:0;" />
                  </td>
                  <td style="font-family:'Inter',Arial,sans-serif;font-size:10px;letter-spacing:0.36em;text-transform:uppercase;color:#8c8680;vertical-align:middle;padding-left:10px;">Bistro</td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- New Reservation heading -->
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <p style="margin:0;font-family:'Cormorant Garamond',Georgia,serif;font-size:36px;font-weight:300;letter-spacing:0.04em;line-height:1;color:#2e2a26;">New Reservation</p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <div style="width:40px;height:1px;background-color:#d6d0c8;margin:0 auto;"></div>
            </td>
          </tr>

          <!-- Body card -->
          <tr>
            <td style="background-color:#f0ece5;border:1px solid #d6d0c8;padding:40px 44px;">

              <!-- Guest -->
              <p style="margin:0 0 6px;font-family:'Inter',Arial,sans-serif;font-size:9px;letter-spacing:0.36em;text-transform:uppercase;color:#8c8680;">Guest</p>
              <p style="margin:0 0 4px;font-family:'Cormorant Garamond',Georgia,serif;font-size:20px;font-weight:400;color:#2e2a26;">{{name}}</p>
              <p style="margin:0 0 32px;font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;color:#5a5550;">{{email}}</p>

              <div style="width:100%;height:1px;background-color:#d6d0c8;margin-bottom:32px;"></div>

              <!-- Dietary -->
              <p style="margin:0 0 6px;font-family:'Inter',Arial,sans-serif;font-size:9px;letter-spacing:0.36em;text-transform:uppercase;color:#8c8680;">Dietary needs</p>
              <p style="margin:0 0 32px;font-family:'Cormorant Garamond',Georgia,serif;font-size:17px;font-style:italic;color:#2e2a26;">{{allergies}}</p>

              <div style="width:100%;height:1px;background-color:#d6d0c8;margin-bottom:32px;"></div>

              <!-- Dishes -->
              <p style="margin:0 0 12px;font-family:'Inter',Arial,sans-serif;font-size:9px;letter-spacing:0.36em;text-transform:uppercase;color:#8c8680;">菜單</p>
              <p style="margin:0 0 32px;font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;color:#2e2a26;line-height:2;white-space:pre-line;">{{dishes}}</p>

              <div style="width:100%;height:1px;background-color:#d6d0c8;margin-bottom:32px;"></div>

              <!-- Shopping list -->
              <p style="margin:0 0 12px;font-family:'Inter',Arial,sans-serif;font-size:9px;letter-spacing:0.36em;text-transform:uppercase;color:#8c8680;">購物清單</p>
              <p style="margin:0;font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;color:#2e2a26;line-height:2;white-space:pre-line;">{{shopping_list}}</p>

            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
